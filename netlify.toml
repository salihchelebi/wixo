# Bu yapı hafif prototipi Netlify'de UI build + functions olarak minimum riskle yayınlamak için eklendi.
[build]
command = "pnpm --filter flowise-ui build"
publish = "packages/ui/build"
functions = "netlify/functions"

[build.environment]
# Bu değişken Netlify deployunda kök rota davranışını hafif prototip admin ekranına sabitler.
VITE_NETLIFY_LITE = "true"

[[redirects]]
from = "/api/admin-config"
to = "/.netlify/functions/admin-config"
status = 200

[[redirects]]
from = "/api/chat"
to = "/.netlify/functions/chat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
