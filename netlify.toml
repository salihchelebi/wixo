# Bu yapı hafif prototipi Netlify'de UI build + functions olarak minimum riskle yayınlamak için eklendi.
[build]
command = "corepack prepare pnpm@10.26.0 --activate && pnpm --filter flowise-ui build"
publish = "packages/ui/build"
functions = "Ai_Asistan/functions"

[build.environment]
# Bu değişken Netlify deployunda kök rota davranışını hafif prototip admin ekranına sabitler.
VITE_AI_ASISTAN = "true"

[[redirects]]
from = "/api/admin-config"
to = "/.netlify/functions/admin-config"
status = 200

[[redirects]]
from = "/api/chat"
to = "/.netlify/functions/chat"
status = 200

[[redirects]]
from = "/api/admin-login"
to = "/.netlify/functions/admin-login"
status = 200

[[redirects]]
from = "/api/admin-session"
to = "/.netlify/functions/admin-session"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
