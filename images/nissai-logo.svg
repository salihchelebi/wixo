    <path d="M104 256C154 219 180 191 212 142C232 111 251 90 282 72" stroke="#0E2A66" stroke-width="8" stroke-linecap="round"/>
    <circle cx="70" cy="236" r="17" fill="#2EC5FF"/>
    <circle cx="171" cy="129" r="17" fill="#2A4DFF"/>
    <circle cx="244" cy="62" r="17" fill="#8A4BFF"/>
    <rect x="56" y="88" width="52" height="16" rx="8" fill="#2EC5FF" opacity="0.88"/>
    <rect x="56" y="122" width="78" height="16" rx="8" fill="#2A4DFF" opacity="0.78"/>
    <rect x="56" y="156" width="104" height="16" rx="8" fill="#8A4BFF" opacity="0.75"/>
