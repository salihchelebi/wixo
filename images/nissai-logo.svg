<svg width="1600" height="500" viewBox="0 0 1600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A4DFF"/>
      <stop offset="55%" stop-color="#2EC5FF"/>
      <stop offset="100%" stop-color="#8A4BFF"/>
    </linearGradient>
    <linearGradient id="textBase" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EAF2FF"/>
      <stop offset="100%" stop-color="#C8D7FF"/>
    </linearGradient>
    <linearGradient id="textAI" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66D8FF"/>
      <stop offset="100%" stop-color="#A45DFF"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="500" fill="transparent"/>

  <g transform="translate(90 85)" filter="url(#softGlow)">
    <rect x="0" y="0" width="330" height="330" rx="54" fill="#091636" stroke="#1A316F" stroke-width="2"/>
