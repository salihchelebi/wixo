# Ai_Asistan yüzeyinde aktif yayın yalnızca UI landing akışıdır.
# netlify/functions ve netlify/data referans omurga olarak repo içinde korunur.
[build]
command = "corepack prepare pnpm@10.26.0 --activate && pnpm --filter flowise-ui build"
publish = "packages/ui/build"

[build.environment]
VITE_NETLIFY_LITE = "true"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
