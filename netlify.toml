[build]
command = "corepack prepare pnpm@10.26.0 --activate && pnpm --filter flowise-ui build"
publish = "packages/ui/build"
functions = "netlify/functions"

[build.environment]
NODE_VERSION = "18.15.0"
VITE_NETLIFY_LITE = "false"

[[redirects]]
from = "/api/v1/*"
to = "/.netlify/functions/flowise-api-proxy"
status = 200

[[redirects]]
from = "/documentstores"
to = "/document-stores"
status = 301

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
